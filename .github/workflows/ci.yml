name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jobradar
          POSTGRES_PASSWORD: jobradar
          POSTGRES_DB: jobradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobradar -d jobradar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare environment
        run: cp env.example .env

      - name: Lint
        run: ruff check .

      - name: Run tests with SQLite
        run: pytest -q
        env:
          DATABASE_URL: sqlite:///:memory:
          TEST_DATABASE_URL: sqlite:///:memory:

      - name: Run tests with PostgreSQL
        run: pytest -q
        env:
          AUTO_CREATE_TABLES: "false"
          DATABASE_URL: postgresql://jobradar:jobradar@localhost:5432/jobradar_test
          TEST_DATABASE_URL: postgresql://jobradar:jobradar@localhost:5432/jobradar_test

      - name: Validate smoke script
        run: python scripts/smoke_check.py --help

      - name: Validate Docker Compose
        run: |
          docker compose config >/tmp/jobradar-compose.yml
          POSTGRES_PASSWORD=change-me \
          SECRET_KEY=ci-secret-key-with-more-than-32-characters \
          BACKEND_CORS_ORIGINS=http://localhost:8501 \
          TRUSTED_HOSTS=localhost,127.0.0.1 \
          TELEGRAM_BOT_USERNAME=jobradar_alertas_bot \
            docker compose -f docker-compose.prod.yml config >/tmp/jobradar-compose-prod.yml
          cp .env.production.example /tmp/jobradar-env-production.example
