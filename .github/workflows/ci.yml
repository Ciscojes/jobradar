name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare environment
        run: cp env.example .env

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q

      - name: Validate Docker Compose
        run: |
          docker compose config >/tmp/jobradar-compose.yml
          POSTGRES_PASSWORD=change-me BACKEND_CORS_ORIGINS=http://localhost:8501 \
            docker compose -f docker-compose.prod.yml config >/tmp/jobradar-compose-prod.yml
